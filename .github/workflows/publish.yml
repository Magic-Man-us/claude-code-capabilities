name: CI & Publish

on:
  push:
    branches: ["**"] # branches only -- a release's tag push must not also fire this as a push event
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    if: github.event_name != 'release' # gitleaks-action doesn't support the release event
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans full history, not just the checked-out commit
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked --python ${{ matrix.python-version }}
      - run: uv run pytest -q --cov --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          slug: magic-man-us/claude-code-capabilities
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          slug: magic-man-us/claude-code-capabilities
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  build:
    if: github.event_name == 'release'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
